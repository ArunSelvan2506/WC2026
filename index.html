<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WC26 EDGE · Prediction Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#07090d;--s1:#0d1117;--s2:#111827;--s3:#1a2336;
  --b1:#1e2d42;--b2:#253550;
  --tx:#e2e8f4;--mu:#5a6a82;--dm:#2e4060;
  --ac:#00c896;--ac2:#3b82f6;--ac3:#f97316;
  --gold:#fbbf24;--red:#ef4444;--grn:#22c55e;--amb:#f59e0b;--pur:#a855f7;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:13px;min-height:100vh}

/* ── TOP BAR ── */
.topbar{
  background:var(--s1);border-bottom:1px solid var(--b1);
  padding:0 16px;display:flex;align-items:center;
  justify-content:space-between;height:52px;
  position:sticky;top:0;z-index:300;gap:12px;
}
.logo{font-size:16px;font-weight:800;letter-spacing:.12em;color:var(--ac);display:flex;align-items:center;gap:7px;white-space:nowrap}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:pp 2s infinite}
@keyframes pp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,200,150,.5)}70%{opacity:.7;box-shadow:0 0 0 8px rgba(0,200,150,0)}}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pill{font-size:10px;font-weight:600;font-family:var(--mono);padding:3px 9px;border-radius:4px;border:1px solid;white-space:nowrap}
.pill-green{background:rgba(0,200,150,.08);border-color:rgba(0,200,150,.3);color:var(--ac)}
.pill-amber{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);color:var(--amb)}
.pill-red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--red)}

/* ── DATE NAV ── */
.date-nav{
  background:var(--s1);border-bottom:2px solid var(--b1);
  padding:0 12px;display:flex;align-items:stretch;gap:2px;
  overflow-x:auto;scrollbar-width:none;position:sticky;top:52px;z-index:200;
}
.date-nav::-webkit-scrollbar{display:none}
.dn-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:60px;padding:8px 12px;cursor:pointer;border:none;background:none;
  font-family:var(--sans);border-bottom:3px solid transparent;
  transition:all .14s;position:relative;flex-shrink:0;gap:1px;
}
.dn-day{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mu)}
.dn-num{font-size:19px;font-weight:800;color:var(--dm)}
.dn-cnt{font-size:9px;font-family:var(--mono);color:var(--dm)}
.dn-btn:hover .dn-num{color:var(--tx)}
.dn-btn.active{border-bottom-color:var(--ac)}
.dn-btn.active .dn-num{color:var(--ac)}
.dn-btn.active .dn-day{color:var(--ac);opacity:.8}
.dn-hot{position:absolute;top:6px;right:8px;width:5px;height:5px;border-radius:50%;background:var(--ac3)}

/* ── MAIN ── */
.page{max-width:980px;margin:0 auto;padding:16px}

/* ── SECTION HEADING ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px;
}
.section-title{font-size:18px;font-weight:700;color:var(--tx)}
.section-sub{font-size:11px;color:var(--mu);margin-top:2px}

/* ── MATCH CARDS ── */
.matches{display:flex;flex-direction:column;gap:10px}

.mcard{
  background:var(--s1);border:1px solid var(--b1);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:border-color .15s;
}
.mcard:hover{border-color:var(--b2)}
.mcard.open{border-color:rgba(0,200,150,.5)}
.mcard.live{border-color:rgba(239,68,68,.4)}

/* card header — always visible */
.mc-head{padding:14px 16px}
.mc-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.mc-teams{font-size:16px;font-weight:700;color:var(--tx);line-height:1.2}
.mc-meta{font-size:10px;font-family:var(--mono);color:var(--mu);margin-top:3px}
.mc-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:4px;white-space:nowrap}
.b-top{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);color:var(--ac)}
.b-upset{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:var(--ac3)}
.b-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--ac2)}
.b-live{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);color:var(--red)}

/* odds + conf row */
.mc-row2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.odds-group{display:flex;gap:5px}
.odd{background:var(--s3);border-radius:6px;padding:5px 10px;text-align:center;min-width:64px}
.odd-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.05em;color:var(--mu)}
.odd-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--tx);margin-top:1px}
.odd-val.fav{color:var(--ac)}
.conf-pill{
  font-family:var(--mono);font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:6px;border:1px solid;
}
.cp-hi{background:rgba(0,200,150,.1);border-color:rgba(0,200,150,.35);color:var(--ac)}
.cp-med{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:var(--amb)}
.cp-lo{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.35);color:var(--red)}
.upset-pill{
  font-size:10px;font-weight:600;padding:4px 9px;border-radius:6px;
  background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);color:var(--ac3);
}
.toggle{font-size:13px;color:var(--mu);margin-left:auto;flex-shrink:0;transition:transform .2s}
.mcard.open .toggle{transform:rotate(180deg)}

/* ── EXPANDED BODY ── */
.mc-body{display:none;padding:0 16px 16px;border-top:1px solid var(--b1)}
.mcard.open .mc-body{display:block}

/* prediction sections */
.pred-sections{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
@media(max-width:680px){.pred-sections{grid-template-columns:1fr}}
.pred-full{grid-column:1/-1}

.psec{background:var(--s3);border:1px solid var(--b1);border-radius:10px;padding:12px}
.psec-title{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.psec-icon{font-size:13px}

/* result prediction */
.result-boxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.rbox{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:9px 6px;text-align:center}
.rbox.winner{border-color:rgba(0,200,150,.4);background:rgba(0,200,150,.06)}
.rbox-team{font-size:10px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbox-odds{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ac);margin:3px 0}
.rbox-pct{font-size:10px;color:var(--mu)}
.winner-label{font-size:11px;font-weight:600;color:var(--ac);text-align:center;padding:5px;background:rgba(0,200,150,.06);border-radius:5px;border:1px solid rgba(0,200,150,.2)}

/* confidence bars */
.cbar{margin-bottom:7px}
.cbar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cbar-label{font-size:10px;color:var(--mu)}
.cbar-pct{font-family:var(--mono);font-size:11px;font-weight:700}
.cbar-track{height:6px;background:var(--s1);border-radius:3px;overflow:hidden;border:1px solid var(--b1)}
.cbar-fill{height:100%;border-radius:3px;transition:width .5s}
.f-hi{background:linear-gradient(90deg,#00c89650,#00c896)}
.f-med{background:linear-gradient(90deg,#f59e0b50,#f59e0b)}
.f-lo{background:linear-gradient(90deg,#ef444450,#ef4444)}
.f-blue{background:linear-gradient(90deg,#3b82f650,#3b82f6)}
.f-pur{background:linear-gradient(90deg,#a855f750,#a855f7)}

/* foul player card */
.fplayer{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px;margin-bottom:8px}
.fplayer.hot{border-color:rgba(0,200,150,.35)}
.fp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px;flex-wrap:wrap}
.fp-name{font-size:12px;font-weight:700;color:var(--tx)}
.fp-club{font-size:9px;color:var(--mu);margin-top:1px}
.hit-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.h100{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--grn)}
.h90{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--grn)}
.h80{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amb)}
.fp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}
.fstat{background:var(--bg);border-radius:5px;padding:5px 7px;border:1px solid var(--b1)}
.fsl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.03em}
.fsv{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--tx)}
.dots{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:7px}
.dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.dy{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.45);color:var(--grn)}
.dn{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.45);color:var(--red)}
.db{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.45);color:#60a5fa}
.dp{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.45);color:#c084fc}
.bet-mini{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg);border-radius:5px;padding:5px 8px;
  border:1px solid var(--b1);margin-bottom:3px;flex-wrap:wrap;gap:5px;
}
.bm-label{font-size:10px;font-weight:600;color:var(--tx)}
.bm-odds{display:flex;gap:4px;flex-wrap:wrap}
.bm-odd{font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:4px;border:1px solid var(--b1);background:var(--s2);color:var(--tx)}
.fp-note{font-size:10px;color:var(--mu);line-height:1.6;margin-top:6px;padding-top:6px;border-top:1px solid var(--b1)}

/* easy bets */
.ebet{
  background:var(--s1);border:1px solid var(--b1);border-radius:8px;
  padding:8px 10px;margin-bottom:5px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
}
.ebet.star{border-color:rgba(0,200,150,.3);background:rgba(0,200,150,.03)}
.eb-left{flex:1;min-width:0}
.eb-cat{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-bottom:1px}
.eb-pick{font-size:11px;font-weight:600;color:var(--tx)}
.eb-odds{font-family:var(--mono);font-size:10px;color:var(--mu);margin-top:1px}
.eb-conf{font-family:var(--mono);font-size:12px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0}
.ehi{background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);color:var(--ac)}
.emed{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amb)}

/* parlay */
.parlay{background:rgba(0,200,150,.04);border:1px solid rgba(0,200,150,.2);border-radius:8px;padding:10px 12px;margin-top:10px}
.pl-head{font-size:10px;font-weight:700;color:var(--ac);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.pl-leg{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:1px solid rgba(0,200,150,.08);font-size:10px;color:var(--mu)}
.pl-leg:last-child{border:none}
.pl-n{width:16px;height:16px;border-radius:50%;background:rgba(0,200,150,.15);color:var(--ac);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl-pick{color:var(--tx);font-weight:600}
.pl-odds{font-family:var(--mono);font-size:9px;color:var(--mu);margin-left:auto;white-space:nowrap}
.pl-ret{font-size:10px;color:var(--mu);border-top:1px solid rgba(0,200,150,.12);padding-top:5px;margin-top:4px}
.pl-ret span{color:var(--ac);font-family:var(--mono);font-weight:700}

.upset-box{background:rgba(249,115,22,.05);border:1px solid rgba(249,115,22,.2);border-radius:7px;padding:7px 10px;margin-top:8px;font-size:10px;color:#fb923c;line-height:1.6}
.ref-box{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.15);border-radius:7px;padding:7px 10px;margin-top:6px;font-size:10px;color:#60a5fa;line-height:1.5}

/* AI */
.ai-block{background:var(--bg);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;margin-top:8px}
.ai-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px}
.ai-lbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mu)}
.ai-btn{font-family:var(--sans);font-size:10px;font-weight:600;background:rgba(0,200,150,.1);border:1px solid rgba(0,200,150,.3);color:var(--ac);border-radius:4px;padding:4px 12px;cursor:pointer;transition:all .12s}
.ai-btn:hover{background:rgba(0,200,150,.2)}
.ai-out{font-size:11px;color:var(--mu);line-height:1.7}
.ai-out.on{color:var(--tx)}
.ld{display:inline-flex;gap:3px}
.ld span{width:4px;height:4px;border-radius:50%;background:var(--ac);animation:blink 1.2s infinite}
.ld span:nth-child(2){animation-delay:.2s}.ld span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Deploy banner */
.deploy-banner{background:linear-gradient(135deg,#0d1c2e,#0d2416);border:1px solid rgba(0,200,150,.25);border-radius:10px;padding:16px 18px;margin-bottom:18px}
.db-title{font-size:13px;font-weight:700;color:var(--ac);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.db-steps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:600px){.db-steps{grid-template-columns:1fr}}
.db-step{background:var(--bg);border:1px solid var(--b1);border-radius:7px;padding:9px 11px}
.db-step-num{font-family:var(--mono);font-size:10px;color:var(--ac);font-weight:700;margin-bottom:4px}
.db-step-title{font-size:11px;font-weight:600;color:var(--tx);margin-bottom:2px}
.db-step-desc{font-size:10px;color:var(--mu);line-height:1.5}
.db-link{font-family:var(--mono);font-size:10px;color:var(--ac2);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:4px;padding:2px 7px;display:inline-block;margin-top:4px;word-break:break-all}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
.disc{font-size:9px;color:var(--dm);text-align:center;padding:12px 16px;border-top:1px solid var(--b1);margin-top:16px;line-height:1.6}
</style>
</head>

const AI_CTX={};

function cc(p){return p>=75?'#00c896':p>=55?'#f59e0b':'#ef4444'}
function cf(p){return p>=75?'f-hi':p>=55?'f-med':'f-lo'}
function cp(p){return p>=75?'cp-hi':p>=55?'cp-med':'cp-lo'}

function buildDateNav(){
  const nav=document.getElementById('dateNav');
  nav.innerHTML=DATES.map(d=>`
    <button class="dn-btn" data-key="${d.key}" onclick="load('${d.key}',this)">
      ${d.hot?'<span class="dn-hot"></span>':''}
      <span class="dn-day">${d.day}</span>
      <span class="dn-num">${d.num}</span>
      <span class="dn-cnt">${d.cnt} games</span>
    </button>`).join('');
}

function load(key,btn){
  document.querySelectorAll('.dn-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const day=DAYS[key];
  const pg=document.getElementById('pageContent');
  if(!day){
    pg.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--mu)"><div style="font-size:36px;opacity:.3;margin-bottom:10px">📅</div><p>Predictions loading for this date — check back soon</p></div>`;
    return;
  }
  pg.innerHTML=`
    <div class="section-head">
      <div>
        <div class="section-title">${day.title}</div>
        <div class="section-sub">${day.sub}</div>
      </div>
    </div>
    <div class="matches">${day.matches.map(buildCard).join('')}</div>
    <div style="margin-top:20px"></div>`;
}

      <div class="mc-body">

          <!-- 1 RESULT -->

            <div class="psec-title"><span class="psec-icon">🏆</span>Result Prediction</div>
            <div class="result-boxes">
              <div class="rbox${m.winner===m.homeTeam?' winner':''}">
                <div class="rbox-team">${m.homeTeam}</div>
                <div class="rbox-odds">${m.odds.h}</div>
                <div class="rbox-pct">${m.winPct}%</div>
              </div>
              <div class="rbox">

              </div>
            </div>
            <div class="winner-label">▶ ${m.winner} · ${m.conf}% confidence</div>
            <div style="margin-top:10px">
              ${m.confBars.map(r=>`
                <div class="cbar">
                  <div class="cbar-head"><span class="cbar-label">${r.l}</span><span class="cbar-pct" style="color:${cc(r.p)}">${r.p}%</span></div>
                  <div class="cbar-track"><div class="cbar-fill ${r.f}" style="width:${r.p}%"></div></div>

          </div>

          <!-- 2 FOULS -->

function toggle(id){
  const el=document.getElementById('mc_'+id);

}

async function runAI(id){
  const el=document.getElementById('aio_'+id);
  if(!el)return;
  el.innerHTML='<div class="ld"><span></span><span></span><span></span></div> Analysing…';
  el.classList.add('on');
  const ctx=AI_CTX[id]||'World Cup 2026 match';
  const p=`WC 2026 betting analyst. Tournament averages: 24.4 fouls/game, 10.6 corners/game, 46 throw-ins/game, 3.14 goals/game, fav win rate 54%, upset rate 46%.\n\nContext: ${ctx}\n\nProvide in bullet format:\n• FOUL PROP: best player, bet, confidence %, 1-sentence reason\n• SOT PROP: best player, bet, confidence %, 1-sentence reason\n• CORNER BET: specific prop, confidence %, 1-sentence reason\n• THROW-IN BET: specific prop, confidence %, 1-sentence reason\n• LIVE TRIGGER: what to watch in first 20 minutes\n• UPSET RISK: single biggest risk factor\n\nMax 200 words. No disclaimers.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:450,messages:[{role:'user',content:p}]})});
    const d=await r.json();
    const t=d.content?.find(b=>b.type==='text')?.text||'Unable to generate.';
    el.innerHTML=t.replace(/\n/g,'<br>');
  }catch(e){el.innerHTML='Analysis unavailable — check connection and retry.'}
}

buildDateNav();

if(todayBtn){todayBtn.classList.add('active');load('23',null)}
